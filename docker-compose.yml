version: "3.8"

services:
  # ----------------------------------------------------------------------------
  # Next.js Web Frontend (apps/web)
  # ----------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: saas-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ENVIRONMENT=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------------------------
  # FastAPI API Backend (apps/api)
  # ----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: saas-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # Live coding support in development
      - ./apps/api:/app
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - API_PORT=8000
      - API_HOST=0.0.0.0
      - SECRET_KEY=development-secret-key-at-least-32-characters-long
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # Redis integration config placeholder (uncomment when redis is active)
      # - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------------------
  # FUTURE INFRASTRUCTURE (Redis & Background Workers)
  # ----------------------------------------------------------------------------
  # Uncomment the blocks below to enable caching/task queues.
  # Note: Also uncomment "depends_on.redis" in the "api" service when active.

