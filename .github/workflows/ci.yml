name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------------------------
  # JavaScript/TypeScript (Next.js & Shared Package) checks
  # ----------------------------------------------------------------------------
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Shared Package
        run: npm run build:shared

      - name: Lint Next.js & Shared
        run: npm run lint

      - name: Test Build Next.js App
        run: npm run build:web

  # ----------------------------------------------------------------------------
  # Python (FastAPI Backend) checks
  # ----------------------------------------------------------------------------
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Ruff Check
        run: |
          cd apps/api
          ruff check .

      - name: Black Format Check
        run: |
          cd apps/api
          black --check .

      - name: Mypy Static Type Analysis
        run: |
          cd apps/api
          mypy .
